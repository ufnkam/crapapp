[build]
publisher = "ufnkam"
packages = ["example"]
features = []

[windows]
targets = [
    "x86_64-pc-windows-gnu",
]
install_path = "$INSTALLPATH"
files = [
    { source = "Cargo.toml", destination = "manifests/Cargo.toml" },
    { source = "some_assets", destination = "some_assets" },
]
icons = [
    { binary = "example", source = "icon.ico" },
]

